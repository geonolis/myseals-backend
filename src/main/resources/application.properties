spring.datasource.url=jdbc:postgresql://db.xvabimylohgdjyhzmvzw.supabase.co:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=[YOUR-PASSWORD]
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Auth0 / Spring Security Configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://dev-your-domain.us.auth0.com/
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://dev-your-domain.us.auth0.com/.well-known/jwks.json

# Server Port
server.port=8080
